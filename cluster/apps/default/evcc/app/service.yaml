---
apiVersion: v1
kind: Service
metadata:
  name: evcc
  namespace: default
spec:
  ports:
    - port: 7070
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: evcc
---
apiVersion: v1
kind: Service
metadata:
  name: evcc-modbus
  namespace: default
  annotations:
    external-dns/internal: "true"
spec:
  type: LoadBalancer
  loadBalancerIP: "172.16.38.210"
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: evcc
  ports:
    - name: huawei
      port: 5021
      targetPort: huawei
      protocol: TCP
    - name: marstek
      port: 5022
      targetPort: marstek
      protocol: TCP
