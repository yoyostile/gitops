---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: globalping-probe
  namespace: networking
  labels:
    app: globalping-probe
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: globalping-probe
  template:
    metadata:
      labels:
        app: globalping-probe
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: globalping-probe
          image: globalping/globalping-probe:latest
          imagePullPolicy: Always
          env:
            - name: GP_ADOPTION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: globalping-probe
                  key: GP_ADOPTION_TOKEN
