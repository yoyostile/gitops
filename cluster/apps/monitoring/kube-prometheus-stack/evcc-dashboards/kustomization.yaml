---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
configMapGenerator:
  - name: evcc-pv-alltime
    files:
      - pv-alltime.json
  - name: evcc-pv-jahr
    files:
      - pv-jahr.json
  - name: evcc-pv-monat
    files:
      - pv-monat.json
  - name: evcc-pv-today-mobile
    files:
      - pv-today-mobile.json
  - name: evcc-pv-today
    files:
      - pv-today.json
  - name: evcc-pv-today-details
    files:
      - pv-today-details.json
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
    grafana_folder: "EVCC"
  labels:
    grafana_dashboard: "1"
