---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: librenms
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: librenms
  template:
    metadata:
      labels:
        app: librenms
    spec:
      nodeSelector:
        topology.kubernetes.io/region: lab
      containers:
        - name: librenms
          image: librenms/librenms:26.5.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          envFrom:
            - secretRef:
                name: librenms
          env:
            - name: LIBRENMS_BASE_URL
              value: "https://librenms.${SECRET_LAB_DOMAIN}"
          volumeMounts:
            - name: librenms
              mountPath: /data
            - name: init-trusted-proxies
              mountPath: /etc/cont-init.d/035-trusted-proxies.sh
              subPath: 035-trusted-proxies.sh
        - name: dispatcher
          image: librenms/librenms:26.5.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          envFrom:
            - secretRef:
                name: librenms
          volumeMounts:
            - name: librenms
              mountPath: /data
          env:
            - name: SIDECAR_DISPATCHER
              value: "1"
      volumes:
        - name: librenms
          persistentVolumeClaim:
            claimName: librenms-ceph
        - name: init-trusted-proxies
          configMap:
            name: librenms-init
            defaultMode: 0755
      dnsConfig:
        options:
          - name: ndots
            value: "1"
