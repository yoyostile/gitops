---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: librenms
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: librenms
  template:
    metadata:
      labels:
        app: librenms
    spec:
      nodeSelector:
        topology.kubernetes.io/region: lab
      containers:
        - name: librenms
          image: librenms/librenms:26.5.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          envFrom:
            - secretRef:
                name: librenms
          env:
            - name: LIBRENMS_BASE_URL
              value: "https://librenms.${SECRET_LAB_DOMAIN}"
          startupProbe:
            # boot runs config:cache + DB validation; allow up to ~5min
            httpGet:
              path: /
              port: 8000
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            periodSeconds: 20
            failureThreshold: 5
          volumeMounts:
            - name: librenms
              mountPath: /data
        - name: dispatcher
          image: librenms/librenms:26.5.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          envFrom:
            - secretRef:
                name: librenms
          volumeMounts:
            - name: librenms
              mountPath: /data
          env:
            - name: SIDECAR_DISPATCHER
              value: "1"
      volumes:
        - name: librenms
          persistentVolumeClaim:
            claimName: librenms-ceph
      dnsConfig:
        options:
          - name: ndots
            value: "1"
