---
apiVersion: v1
kind: ConfigMap
metadata:
  name: librenms-init
  namespace: monitoring
data:
  # LibreNMS 26.5.0+ defaults APP_TRUSTED_PROXIES to 127.0.0.1 (PR #19537).
  # php-fpm runs with clear_env=yes, so the container env var never reaches
  # Laravel, and the image's init script does not write APP_TRUSTED_PROXIES to
  # .env. This drop-in runs after 03-config.sh (which rewrites .env) and before
  # 04-svc-main.sh (which runs `artisan config:cache`), injecting the trusted
  # proxy so https scheme detection works behind Traefik.
  035-trusted-proxies.sh: |
    #!/usr/bin/with-contenv bash
    grep -q '^APP_TRUSTED_PROXIES=' /opt/librenms/.env \
      || echo 'APP_TRUSTED_PROXIES=*' >> /opt/librenms/.env
