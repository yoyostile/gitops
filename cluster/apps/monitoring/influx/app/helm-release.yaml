---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: influx
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://helm.influxdata.com/
      chart: influxdb
      version: 4.12.5
      sourceRef:
        kind: HelmRepository
        name: influxdata-charts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    persistence:
      enabled: true
      storageClass: proxmox-data-ext4
      accessMode: ReadWriteOnce
      size: 50Gi
    ingress:
      enabled: true
      tls: true
      secretName: "${SECRET_LAB_DOMAIN/./-}-tls"
      hostname: influxdb.${SECRET_LAB_DOMAIN}
      className: traefik-internal
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        traefik.ingress.kubernetes.io/router.middlewares: "networking-internal-ips-only@kubernetescrd"
        external-dns/internal: "true"
    config:
      data:
        max-series-per-database: 0
        max-values-per-tag: 0
